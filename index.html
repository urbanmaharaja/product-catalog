<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Maharaja Store</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.banner img{width:100%;height:200px;object-fit:cover;transition:opacity 0.5s;}
.topbar{display:flex;gap:10px;padding:10px;background:#fff;flex-wrap:wrap;position:sticky;top:0;}
input,select,button{padding:10px;border-radius:8px;border:1px solid #ccc;}
button{cursor:pointer;background:#000;color:#fff;border:none;}
.catalog{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px;}
@media(min-width:768px){.catalog{grid-template-columns:repeat(3,1fr);}}
.card{background:#fff;border-radius:12px;overflow:hidden;}
.image-wrap{aspect-ratio:1/1;position:relative;cursor:pointer;}
.image-wrap img{width:100%;height:100%;object-fit:cover;}
.overlay{position:absolute;top:8px;left:8px;display:flex;gap:6px;}
.overlay button{background:#fff;color:#000;border-radius:50%;width:34px;height:34px;}
.card-content{padding:10px;}
.price{color:green;font-weight:bold;}
.btn{background:#25D366;color:#fff;width:100%;margin-top:6px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:9999;}
.modal.active{display:flex;}
.modal img{max-width:90%;max-height:75vh;}
.arrow{position:absolute;top:50%;font-size:30px;color:#fff;cursor:pointer;}
.left{left:20px;} .right{right:20px;}
.close{position:absolute;top:20px;right:20px;color:white;font-size:25px;cursor:pointer;}
.highlight{outline:3px solid #25D366;}
.link{color:blue;cursor:pointer;text-decoration:underline;}
</style>
</head>

<body>

<div class="banner">
<img id="bannerImg" src="https://raw.githubusercontent.com/urbanmaharaja/product-catalog/main/images/banner1.jpeg">
</div>

<div class="topbar">
<select id="dateFilter">
<option value="all" selected>All</option>
<option value="today">Today</option>
<option value="week">Week</option>
<option value="month">Month</option>
</select>

<select id="categoryFilter"><option value="all">All</option></select>

<input id="searchInput" placeholder="Search name, size, code, available..." />

<button onclick="viewAll()">View All</button>
<button onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
<button onclick="openWishlist()">❤️ Wishlist (<span id="wishCount">0</span>)</button>

<span id="productCount"></span>
</div>

<div id="catalog" class="catalog"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="close" onclick="closeModal()">✕</div>
<div class="arrow left" onclick="prev()">‹</div>
<img id="modalImg">
<div class="arrow right" onclick="next()">›</div>
<div id="slideInfo" style="color:white;position:absolute;bottom:20px;"></div>

<div style="position:absolute;bottom:60px;display:flex;gap:10px;">
<button onclick="modalAddCart()">🛒</button>
<button onclick="modalAddWishlist()">❤️</button>
</div>
</div>

<!-- SIZE -->
<div id="sizeModal" class="modal">
<div style="background:white;padding:20px;border-radius:10px;">
<h3>Select Size</h3>
<input id="sizeInput" placeholder="S, M, L">
<br><br>
<button onclick="closeSize()">Cancel</button>
<button onclick="confirmOrder()">Continue</button>
</div>
</div>

<!-- SUMMARY -->
<div id="summaryPage" class="modal">
<div class="close" onclick="closeSummary()">✕</div>
<div style="background:white;padding:20px;border-radius:10px;width:90%;max-width:600px;">
<h3 id="summaryTitle"></h3>
<div id="summaryItems"></div>
<h4 id="total"></h4>
<button onclick="orderCart()" class="btn">Order on WhatsApp</button>
</div>
</div>

<script>
const sheetUrl="https://opensheet.elk.sh/1gTommr2PH9eiEEdX1aCxSdVJ1RyN6aj07UsFIqu6jj8/products";

let products=[],filtered=[],cart=[],wishlist=[];
let currentImages=[],currentIndex=0,currentProduct=null,currentProductIndex=null;

cart = JSON.parse(localStorage.getItem("cart") || "[]");
wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");

window.addEventListener("load", ()=>{
cartCount.innerText = cart.length;
wishCount.innerText = wishlist.length;
});

function saveCart(){localStorage.setItem("cart", JSON.stringify(cart));}
function saveWishlist(){localStorage.setItem("wishlist", JSON.stringify(wishlist));}

function clean(v){return (v||"").toString().trim();}
function parseDate(d){if(!d)return null;let p=d.split("-");return new Date(p[0],p[1]-1,p[2]);}

function load(){
fetch(sheetUrl).then(r=>r.json()).then(data=>{
products=data.map(r=>({
name:clean(r.name),
category:clean(r.category).toLowerCase(),
price:clean(r.price),
date:parseDate(r.date),
images:[r.image,r.image2,r.image3,r.image4].filter(Boolean),
tags:clean(r.tags).toLowerCase(),
id:clean(r.id),
status:clean(r.status),
description: clean(r.description),
sizes: clean(r.available_sizes).toLowerCase(),
showPrice: clean(r.show_price).toLowerCase(),
stock: clean(r.stock).toLowerCase(),
whatsapp: clean(r.whatsapp_text)
})).filter(p=>p.status==="active");

populateCategories();
render();
});
}

function populateCategories(){
let cats=[...new Set(products.map(p=>p.category))];
cats.forEach(c=>{
let o=document.createElement("option");
o.value=c;o.textContent=c;
categoryFilter.appendChild(o);
});
}

function matchDate(p,f){
if(!p.date) return true;
let t=new Date();
if(f==="today") return p.date.toDateString()===t.toDateString();
if(f==="week"){let w=new Date();w.setDate(t.getDate()-7);return p.date>=w;}
if(f==="month"){let m=new Date();m.setMonth(t.getMonth()-1);return p.date>=m;}
return true;
}

function matchSearch(p, s){
if(!s) return true;
let words = s.split(" ");
return words.every(w =>
p.name.toLowerCase().includes(w) ||
(p.description||"").toLowerCase().includes(w) ||
p.category.includes(w) ||
p.tags.includes(w) ||
p.id.toLowerCase().includes(w) ||
p.sizes.includes(w) ||
p.stock.includes(w) ||
(w==="noprice" && p.showPrice==="n") ||
(w==="available" && p.stock==="available")
);
}

function render(){
let s=searchInput.value.toLowerCase();
let c=categoryFilter.value;
let d=dateFilter.value;

filtered=products.filter(p=>
matchSearch(p,s)
&&(c==="all"||p.category===c)
&&matchDate(p,d)
);

productCount.innerText=`Products (${filtered.length})`;

catalog.innerHTML="";
filtered.forEach((p,i)=>{
catalog.innerHTML+=`
<div class="card" id="p${i}">
<div class="image-wrap" onclick="openProduct(${i})">
<img src="${p.images[0]}">
<div class="overlay">
<button onclick="event.stopPropagation();addWishlist(${i})">❤️</button>
<button onclick="event.stopPropagation();addCart(${i})">🛒</button>
</div>
</div>

<div class="card-content">
<b>${p.name}</b>
<div>${p.description || ""}</div>
<div style="font-size:12px;">Sizes: ${p.sizes || "-"}</div>
${p.stock && p.stock!=="available" ? `<div style="color:red;font-size:12px;">Out of stock</div>` : ``}
${p.showPrice==="y" ? `<div class="price">₹${p.price}</div>` : ``}
<div style="font-size:12px;">Code: ${p.id}</div>
<button class="btn" onclick="order(${i})">Order</button>
</div>
</div>`;
});
}

/* ===== REST OF YOUR ORIGINAL FUNCTIONS UNCHANGED ===== */

function openProduct(i){
currentProductIndex=i;
currentProduct=filtered[i];
currentImages=currentProduct.images;
currentIndex=0;
showImage();
}

function viewAll(){
currentImages=filtered.map(p=>p.images[0]);
currentProduct=null;
currentIndex=0;
showImage();
}

function showImage(){
modal.classList.add("active");
modalImg.src=currentImages[currentIndex];
let code = currentProduct ? ` | Code: ${currentProduct.id}` : "";
slideInfo.innerText=`${currentIndex+1}/${currentImages.length}${code}`;
}

function next(){currentIndex=(currentIndex+1)%currentImages.length;showImage();}
function prev(){currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;showImage();}
function closeModal(){modal.classList.remove("active");}

modalImg.onclick=()=>{
closeModal();
if(currentProductIndex!==null){
let el=document.getElementById("p"+currentProductIndex);
el.scrollIntoView({behavior:"smooth"});
el.classList.add("highlight");
setTimeout(()=>el.classList.remove("highlight"),1500);
}
};

function addCart(i){cart.push(filtered[i]);cartCount.innerText=cart.length;saveCart();}
function addWishlist(i){wishlist.push(filtered[i]);wishCount.innerText=wishlist.length;saveWishlist();}

function modalAddCart(){ if(currentProduct) cart.push(currentProduct); cartCount.innerText=cart.length; saveCart();}
function modalAddWishlist(){ if(currentProduct) wishlist.push(currentProduct); wishCount.innerText=wishlist.length; saveWishlist();}

function openCart(){openSummary("cart");}
function openWishlist(){openSummary("wishlist");}

function openSummary(type){
summaryPage.classList.add("active");
summaryTitle.innerText = type==="cart" ? "Cart" : "Wishlist";

let arr = type==="cart" ? cart : wishlist;
summaryItems.innerHTML = "";

if(arr.length===0){
summaryItems.innerHTML="<p>No items</p>";
total.innerText="";
return;
}

let totalPrice=0;

arr.forEach((p,i)=>{
let price=parseInt(p.price)||0;
totalPrice+=price;

summaryItems.innerHTML+=`
<div style="display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding:10px 0;">
<span class="link" onclick="goToProduct('${p.id}')">${p.id}</span>
<span>${p.name}</span>
<span>₹${p.price}</span>
<button onclick="removeItem('${type}',${i})">❌</button>
</div>`;
});

if(type==="cart"){total.innerText="Total: ₹"+totalPrice;}
}

function removeItem(type,i){
if(type==="cart"){cart.splice(i,1);cartCount.innerText=cart.length;saveCart();}
else{wishlist.splice(i,1);wishCount.innerText=wishlist.length;saveWishlist();}
openSummary(type);
}

function closeSummary(){summaryPage.classList.remove("active");}

function goToProduct(id){
closeSummary();
let index=filtered.findIndex(p=>p.id===id);
if(index>-1){
let el=document.getElementById("p"+index);
el.scrollIntoView({behavior:"smooth"});
el.classList.add("highlight");
setTimeout(()=>el.classList.remove("highlight"),1500);
}
}

function order(i){
currentProduct=filtered[i];
sizeInput.value=currentProduct.sizes;
sizeModal.classList.add("active");
}

function confirmOrder(){
let size=sizeInput.value||"Not specified";
let msg=`${currentProduct.whatsapp} - ${currentProduct.name} (${currentProduct.id}) Size ${size}`;
window.open(`https://wa.me/918074656528?text=${encodeURIComponent(msg)}`);
closeSize();
}

function closeSize(){sizeModal.classList.remove("active");}

function orderCart(){
if(cart.length===0){alert("Cart empty");return;}
let msg="Hi, I want to order:\n\n";
cart.forEach(p=>msg+=`${p.name} (${p.id}) - ₹${p.price}\n`);
window.open(`https://wa.me/918074656528?text=${encodeURIComponent(msg)}`);
}

searchInput.oninput=render;
categoryFilter.onchange=render;
dateFilter.onchange=render;

load();
</script>

</body>
</html>
