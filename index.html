<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Maharaja Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #1f2937;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 15px;
      background: white;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }
    input, select {
      padding: 10px;
      font-size: 16px;
      width: 220px;
    }
    .catalog {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      background: #eee;
    }
    .card-content {
      padding: 15px;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .price {
      color: green;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 14px;
      color: #444;
      margin-bottom: 8px;
    }
    .stock {
      font-size: 13px;
      margin-bottom: 12px;
      color: #666;
    }
    .btn {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>Urban Maharaja Store</h1>
    <p>Daily New Arrivals | Order on WhatsApp</p>
  </header>

  <div class="topbar">
    <input type="text" id="searchInput" placeholder="Search products..." />
    <select id="categoryFilter">
      <option value="all">All Categories</option>
    </select>
  </div>

  <div class="catalog" id="catalog"></div>

  <script>
    const whatsappNumber = "918074656528";

    const products = [
          {
            id: "P001",
            name: "Premium T-shirt",
            category: "T-shirt",
            price: "799",
            image: "images/p001.jpeg",
            description: "test",
            stock: "available"
          },
          {
            id: "P002",
            name: "Premium T-shirt",
            category: "T-shirt",
            price: "799",
            image: "images/p002.jpeg",
            description: "test",
            stock: "available"
          },
          {
            id: "P003",
            name: "Premium T-shirt",
            category: "T-shirt",
            price: "799",
            image: "images/p003.jpeg",
            description: "test",
            stock: "available"
          }
        ];

    const catalog = document.getElementById("catalog");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");

    function populateCategories() {
      const categories = [...new Set(products.map(p => p.category))];
      categories.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
      });
    }

    function renderProducts() {
      const searchText = searchInput.value.toLowerCase();
      const selectedCategory = categoryFilter.value;

      catalog.innerHTML = "";

      const filtered = products.filter(product => {
        const matchesSearch =
          product.name.toLowerCase().includes(searchText) ||
          product.description.toLowerCase().includes(searchText) ||
          product.id.toLowerCase().includes(searchText);

        const matchesCategory =
          selectedCategory === "all" || product.category === selectedCategory;

        return matchesSearch && matchesCategory;
      });

      if (filtered.length === 0) {
        catalog.innerHTML = "<p>No products found.</p>";
        return;
      }

      filtered.forEach(product => {
        const message = encodeURIComponent(
          `Hi, I want to order:\nProduct: ${product.name}\nCode: ${product.id}\nPrice: ₹${product.price}`
        );
        const waLink = `https://wa.me/${whatsappNumber}?text=${message}`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <div class="card-content">
            <h3>${product.name}</h3>
            <div class="price">₹${product.price}</div>
            <div class="desc">${product.description}</div>
            <div class="stock">${product.stock}</div>
            <a class="btn" href="${waLink}" target="_blank">Order on WhatsApp</a>
          </div>
        `;
        catalog.appendChild(card);
      });
    }

    searchInput.addEventListener("input", renderProducts);
    categoryFilter.addEventListener("change", renderProducts);

    populateCategories();
    renderProducts();
  </script>

</body>
</html>
