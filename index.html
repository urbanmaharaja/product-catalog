<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Maharaja Store</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#000;color:#fff;text-align:center;padding:30px;}

.topbar{display:flex;gap:10px;padding:10px;background:#fff;flex-wrap:wrap;position:sticky;top:0;}
input,select,button{padding:10px;border-radius:8px;border:1px solid #ccc;}

.catalog{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;padding:15px;}

.card{background:#fff;border-radius:12px;overflow:hidden;transition:.2s;}
.card:hover{transform:scale(1.02);box-shadow:0 6px 18px rgba(0,0,0,0.2);}

.image-wrap{aspect-ratio:1/1;position:relative;cursor:pointer;}
.image-wrap img{width:100%;height:100%;object-fit:cover;}

.badge{position:absolute;bottom:8px;right:8px;background:#000;color:#fff;padding:4px 8px;border-radius:10px;font-size:12px;}

.overlay{position:absolute;top:8px;left:8px;display:flex;gap:6px;}
.overlay button{background:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;}

.card-content{padding:10px;}
.price{color:green;font-weight:bold;}

.btn{background:#25D366;color:#fff;border:none;width:100%;margin-top:6px;padding:10px;border-radius:8px;}

.result{text-align:center;color:#555;}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:9999;}
.modal.active{display:flex;}

.modal img{max-width:90%;max-height:75vh;border-radius:10px;}

.arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:30px;color:#fff;background:rgba(0,0,0,0.5);padding:10px;border-radius:50%;cursor:pointer;}
.left{left:20px;} .right{right:20px;}

.close{position:absolute;top:20px;right:20px;color:white;font-size:25px;cursor:pointer;}

.highlight{outline:3px solid #25D366;}

.sizeModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.sizeBox{background:white;padding:20px;border-radius:12px;width:300px;}

.cartBtn{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:14px;border-radius:50px;}

</style>
</head>

<body>

<header>
<h2>Urban Maharaja Store</h2>
</header>

<div class="topbar">
<select id="dateFilter">
<option value="today">Today</option>
<option value="week">Week</option>
<option value="month">Month</option>
<option value="all">All</option>
</select>

<select id="categoryFilter"><option value="all">All</option></select>

<input id="searchInput" placeholder="Search products, tags, code..." />

<button onclick="viewAll()">View All</button>
</div>

<div class="result" id="result"></div>

<div id="catalog" class="catalog"></div>

<button id="cartBtn" class="cartBtn">Cart (0)</button>

<!-- SLIDESHOW -->
<div id="modal" class="modal">
<div class="close" onclick="closeModal()">✕</div>
<div class="arrow left" onclick="prev()">‹</div>
<img id="modalImg">
<div class="arrow right" onclick="next()">›</div>
</div>

<!-- SIZE -->
<div id="sizeModal" class="sizeModal">
<div class="sizeBox">
<h3>Select Size</h3>
<input id="sizeInput" placeholder="Example: S, M, L, XL">
<br><br>
<button onclick="closeSize()">Cancel</button>
<button onclick="confirmOrder()">Continue</button>
</div>
</div>

<script>
const sheetUrl="https://opensheet.elk.sh/1gTommr2PH9eiEEdX1aCxSdVJ1RyN6aj07UsFIqu6jj8/products";

let products=[],filtered=[],cart=[],wishlist=[];
let currentImages=[],currentIndex=0,currentProduct=null,currentProductIndex=null;

function clean(v){return (v||"").toString().trim();}
function parseDate(d){let p=d.split("-");return new Date(p[0],p[1]-1,p[2]);}

function load(){
fetch(sheetUrl).then(r=>r.json()).then(data=>{
products=data.map(r=>({
name:clean(r.name),
category:clean(r.category).toLowerCase(),
price:clean(r.price),
date:parseDate(clean(r.date)),
images:[clean(r.image),clean(r.image2),clean(r.image3),clean(r.image4)].filter(Boolean),
tags:clean(r.tags).toLowerCase(),
id:clean(r.id).toLowerCase(),
status:clean(r.status).toLowerCase()
})).filter(p=>p.status==="active");

populateCategories();
render();
});
}

function populateCategories(){
let cats=[...new Set(products.map(p=>p.category))];
cats.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.textContent=c;
categoryFilter.appendChild(o);
});
}

function matchDate(d,f){
let t=new Date();
if(f==="today") return d.toDateString()===t.toDateString();
if(f==="week"){let w=new Date();w.setDate(t.getDate()-7);return d>=w;}
if(f==="month"){let m=new Date();m.setMonth(t.getMonth()-1);return d>=m;}
return true;
}

function render(){
let s=searchInput.value.toLowerCase();
let c=categoryFilter.value;
let d=dateFilter.value;

filtered=products.filter(p=>
(p.name.toLowerCase().includes(s)||p.tags.includes(s)||p.id.includes(s))
&&(c==="all"||p.category===c)
&&matchDate(p.date,d)
);

result.innerText=`${filtered.length} products found`;

catalog.innerHTML="";
if(filtered.length===0){catalog.innerHTML="No products found";return;}

filtered.forEach((p,i)=>{
catalog.innerHTML+=`
<div class="card" id="p${i}">
<div class="image-wrap" onclick="openProduct(${i})">
<img src="${p.images[0]}">
${p.images.length>1?`<div class="badge">${p.images.length} images</div>`:""}
<div class="overlay">
<button onclick="event.stopPropagation();addWishlist(${i})">❤️</button>
<button onclick="event.stopPropagation();addCart(${i})">🛒</button>
</div>
</div>
<div class="card-content">
<b>${p.name}</b>
<div class="price">${p.price!="Ask me"?"₹"+p.price:"Ask me"}</div>
<button class="btn" onclick="order(${i})">Order on WhatsApp</button>
</div>
</div>`;
});
}

function openProduct(i){
currentProductIndex=i;
currentProduct=filtered[i];
currentImages=currentProduct.images;
currentIndex=0;
showImage();
}

function showImage(){
modal.classList.add("active");
modalImg.src=currentImages[currentIndex];
}

function next(){currentIndex=(currentIndex+1)%currentImages.length;showImage();}
function prev(){currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;}
function closeModal(){modal.classList.remove("active");}

modalImg.onclick=()=>{
closeModal();
let el=document.getElementById("p"+currentProductIndex);
el.scrollIntoView({behavior:"smooth"});
el.classList.add("highlight");
setTimeout(()=>el.classList.remove("highlight"),1500);
};

function viewAll(){
currentImages=filtered.map(p=>p.images[0]);
currentIndex=0;
currentProduct=null;
showImage();
}

function order(i){
currentProduct=filtered[i];
sizeInput.value="";
sizeModal.style.display="flex";
}

function closeSize(){
sizeModal.style.display="none";
}

function confirmOrder(){
let size=sizeInput.value||"Not specified";
let msg=`Hi, I want to order ${currentProduct.name} Size ${size}`;
window.open(`https://wa.me/918074656528?text=${encodeURIComponent(msg)}`);
closeSize();
}

function addCart(i){
cart.push(filtered[i]);
cartBtn.innerText=`Cart (${cart.length})`;
}

function addWishlist(i){
wishlist.push(filtered[i]);
alert("Added to wishlist ❤️");
}

searchInput.oninput=render;
categoryFilter.onchange=render;
dateFilter.onchange=render;

load();
</script>

</body>
</html>
